name: MiniShopCI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Pruebas y Análisis de Calidad
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Checkout del código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2 - Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 3 - Compilar el proyecto
        run: mvn compile --no-transfer-progress

      - name: 4 - Ejecutar pruebas unitarias
        run: mvn test --no-transfer-progress

      - name: 5 - Ejecutar pruebas de integración y generar cobertura
        run: mvn verify --no-transfer-progress

      - name: 6 - Análisis de calidad con SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar
          --no-transfer-progress
          -Dsonar.projectKey=6c94f21dceb49e6811e0df1af4552726ffbcd8cb
          -Dsonar.organization=angelo-380
          -Dsonar.branch.name=main

      - name: 7 - Publicar reporte de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-pruebas-y-cobertura
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 7